<!DOCTYPE html>
<html>
<head>
    <title>FINAL BOSS: Chaos Swarm V2</title>
    <style>
        body { background: #000; color: #fff; text-align: center; overflow: hidden; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        
        /* The Main Page Smiley */
        #smiley { font-size: 150px; font-weight: bold; animation: wobble 0.5s infinite, strobe 0.1s infinite; }
        
        @keyframes wobble {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            25% { transform: translate(-10px, 10px) rotate(-15deg) scale(1.2); }
            50% { transform: translate(10px, -10px) rotate(15deg) scale(0.8); }
            75% { transform: translate(-10px, -10px) rotate(-5deg) scale(1.1); }
            100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        }

        @keyframes strobe {
            0% { color: #ff0000; filter: drop-shadow(0 0 20px #ff0000); }
            50% { color: #00ff00; filter: drop-shadow(0 0 20px #00ff00) invert(100%); }
            100% { color: #0000ff; filter: drop-shadow(0 0 20px #0000ff); }
        }
    </style>
</head>
<body>

    <div id="smiley">:)</div>

    <div id="boss-container" style="position: absolute; top: 0; left: 0; z-index: 10;">
    <div id="boss-window" style="width: 400px; height: 300px; border: 5px solid #ff00ff; background: #000; position: relative;">
        <div style="background: #333; color: #fff; padding: 5px; font-family: sans-serif;">SYSTEM_CORE_V2</div>
        <iframe id="boss-frame" src="about:blank" width="100%" height="90%" style="border:none;"></iframe>
    </div>
</div>

<script>
    // Configuration for safe movement and updates
    const bossWindow = document.getElementById('boss-window');
    const bossFrame = document.getElementById('boss-frame');
    const links = ["https://xd8998.github.io/gamesite/"];

    function updateBoss() {
        // Random position within screen bounds
        bossWindow.style.left = (Math.random() * (window.innerWidth - 400)) + 'px';
        bossWindow.style.top = (Math.random() * (window.innerHeight - 300)) + 'px';
        
        // Randomly pick a link
        bossFrame.src = links[Math.floor(Math.random() * links.length)];
    }

    // Set to 3000ms (3 seconds) to keep performance stable
    setInterval(updateBoss, 3000);
</script>

            const w = 350;
            const h = 350;
            const x = Math.floor(Math.random() * (screenW - w));

            if (win) {

        <script>
    // This function will trigger every 3 seconds
    setInterval(() => {
        // We open a new window that points to the current page's URL
        // We set a small width/height and random top/left positions
        const w = 300;
        const h = 200;
        const randomX = Math.floor(Math.random() * (screen.availWidth - w));
        const randomY = Math.floor(Math.random() * (screen.availHeight - h));
        
        // This attempts to open the same page again
        // 'window.location.href' ensures it re-opens this exact file
        window.open(window.location.href, "_blank", 
            `width=${w},height=${h},left=${randomX},top=${randomY},popup=yes`);
            
    }, 3000); // 3000ms = 3 seconds
    </script>

</html>
